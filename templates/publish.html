{% extends "base.html" %}
{% block title %}发布信息 - 湖北汽车工业学院校园失物招领信息管理系统{% endblock %}
{% block content %}
<section class="content-card wide">
    <div class="section-title">
        <p class="eyebrow">Publish</p>
        <h1>发布失物 / 招领信息</h1>
        <p>请尽量填写清楚地点、时间和特征，方便系统进行轻量化规则匹配。</p>
    </div>
    <form method="post" enctype="multipart/form-data" class="form-grid two-col">
        <label>信息类型
            <select name="item_type" required>
                <option value="失物">失物</option>
                <option value="招领">招领</option>
            </select>
        </label>
        <label>物品名称
            <input name="title" placeholder="例如：蓝色校园卡" required>
        </label>
        <label>物品分类
            <select name="category" required>
                {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>
        </label>
        <label>丢失 / 拾取地点
            <input name="location" placeholder="例如：图书馆二楼" required>
        </label>
        <label>丢失 / 拾取时间
            <input type="datetime-local" name="event_time" required>
        </label>
        <label>联系方式
            <input name="contact" placeholder="手机号、QQ 或宿舍信息" required>
        </label>
        <label class="full">详细描述
            <textarea name="description" rows="5" placeholder="请描述颜色、品牌、特殊标记等可验证信息" required></textarea>
            <span class="form-tip">请尽量填写颜色、品牌、特殊标记、丢失或拾到地点等信息，描述越详细越容易匹配。</span>
        </label>
        <label class="full">图片上传（可选）
            <input type="file" name="image" accept="image/*">
        </label>
        <div class="form-actions full">
            <button class="btn btn-primary" type="submit">确认发布</button>
            <a class="btn btn-muted" href="{{ url_for('index') }}">取消</a>
        </div>
    </form>
</section>
{% endblock %}
